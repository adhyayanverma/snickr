{% extends "base.html" %}
{% block title %}New Channel – snickr{% endblock %}
{% block topbar %}
<div class="topbar">
  <span class="topbar-title">New Channel</span>
  <span class="topbar-sub">in {{ ws.name }}</span>
</div>
{% endblock %}
{% block content %}
<div class="page-body" style="max-width:480px">
  <div class="card">
    <div style="font-family:var(--mono);font-size:14px;font-weight:700;margin-bottom:16px">
      Create a Channel
    </div>
    <form method="post" action="{{ url_for('new_channel', ws_id=ws_id) }}">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Channel Name</label>
        <input type="text" name="name" required autofocus placeholder="e.g. backend"
               pattern="[a-zA-Z0-9_\-]+" title="Letters, numbers, hyphens, underscores only">
      </div>
      <div class="form-group">
        <label>Description (optional)</label>
        <input type="text" name="description" placeholder="What is this channel for?">
      </div>
      <div class="form-group">
        <label>Type</label>
        <select name="channel_type">
          <option value="public">Public – anyone in the workspace can join</option>
          <option value="private">Private – invite only</option>
        </select>
      </div>
      <div style="display:flex;gap:8px">
        <a href="{{ url_for('workspace', ws_id=ws_id) }}" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary">Create →</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

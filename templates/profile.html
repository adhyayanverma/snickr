{% extends "base.html" %}
{% block title %}Profile – snickr{% endblock %}
{% block topbar %}
<div class="topbar"><span class="topbar-title">Your Profile</span></div>
{% endblock %}
{% block content %}
<div class="page-body" style="max-width:480px">
  <div class="card">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
      <div style="width:54px;height:54px;border-radius:12px;background:var(--accent2);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:22px;color:#fff">
        {{ user.username[0].upper() }}
      </div>
      <div>
        <div style="font-family:var(--mono);font-weight:700;font-size:16px">@{{ user.username }}</div>
        <div style="font-size:12px;color:var(--muted)">{{ user.email }}</div>
      </div>
    </div>
    <div style="font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px">Member since</div>
    <div style="font-size:13px">{{ user.created_at.strftime('%B %d, %Y') }}</div>
  </div>
</div>
{% endblock %}

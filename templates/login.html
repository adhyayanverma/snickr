{% extends "base.html" %}
{% block title %}Sign in – snickr{% endblock %}
{% block body %}
<div class="full-center" style="background: var(--bg);">
  <div class="auth-box">
    <div class="auth-logo">sni<span>ckr</span></div>
    <div class="auth-tagline">team messaging, no nonsense</div>

    {% for cat, msg in get_flashed_messages(with_categories=True) %}
      <div class="alert alert-{{ cat }}" style="margin-bottom:12px">{{ msg }}</div>
    {% endfor %}

    <form method="post" action="{{ url_for('login') }}">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required autofocus placeholder="your_handle">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px">
        Sign in →
      </button>
    </form>

    <div style="text-align:center;margin-top:18px;color:var(--muted);font-size:13px">
      No account? <a href="{{ url_for('register') }}">Create one</a>
    </div>
  </div>
</div>
{% endblock %}

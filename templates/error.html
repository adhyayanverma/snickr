{% extends "base.html" %}
{% block title %}{{ code }} – snickr{% endblock %}
{% block topbar %}<div class="topbar"><span class="topbar-title">Error</span></div>{% endblock %}
{% block content %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);text-align:center">
  <div style="font-family:var(--mono);font-size:72px;font-weight:700;color:var(--border);margin-bottom:8px">{{ code }}</div>
  <div style="font-family:var(--mono);font-size:16px;margin-bottom:8px">{{ msg }}</div>
  <a href="{{ url_for('dashboard') }}" class="btn btn-secondary" style="margin-top:16px">← Home</a>
</div>
{% endblock %}
